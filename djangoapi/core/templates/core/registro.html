<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Portal Geoespacial</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient-1: #1a0b2e;
            --bg-gradient-2: #2d1b4e;
            --bg-gradient-3: #432874;
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text-color: #ffffff;
            --primary-accent: #a067ff;
            --danger-accent: #ff4b2b;
            --success-accent: #00e676;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-1), var(--bg-gradient-2), var(--bg-gradient-3));
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-color);
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .glass-container {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.3);
            transform: translateY(0);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .glass-container:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 50px rgba(0,0,0,0.4);
        }

        h2 {
            margin-top: 0;
            font-weight: 800;
            text-align: center;
            margin-bottom: 25px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            margin-bottom: 8px;
            font-weight: 300;
        }

        .optional-badge {
            font-size: 0.75rem;
            background: rgba(255,255,255,0.1);
            padding: 2px 6px;
            border-radius: 10px;
            color: #ddd;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: none;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            color: white;
            font-family: 'Inter', sans-serif;
            border: 1px solid var(--glass-border);
            outline: none;
            transition: background 0.3s ease, border 0.3s ease;
            box-sizing: border-box;
        }

        input:focus {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid var(--primary-accent);
        }

        .admin-field {
            border-left: 3px solid var(--primary-accent);
            border-radius: 8px;
            padding-left: 10px;
        }
        
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(45deg, #7b2cbf 0%, #9d4edd 100%);
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: opacity 0.3s ease, transform 0.2s ease;
            margin-top: 10px;
        }

        .btn:hover {
            opacity: 0.9;
        }
        .btn:active {
            transform: scale(0.98);
        }

        .msg-box {
            padding: 10px 15px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        .error-msg {
            background: rgba(255, 75, 43, 0.2);
            border-left: 4px solid var(--danger-accent);
        }

        .success-msg {
            background: rgba(0, 230, 118, 0.2);
            border-left: 4px solid var(--success-accent);
        }

        .footer-links {
            margin-top: 25px;
            text-align: center;
            font-size: 0.85rem;
            font-weight: 300;
        }
        .footer-links a {
            color: var(--primary-accent);
            text-decoration: none;
        }
        .footer-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="glass-container">
        <h2>Únete a GEO🚀</h2>

        {% if error %}
        <div class="msg-box error-msg">
            {{ error }}
        </div>
        {% endif %}

        {% if success %}
        <div class="msg-box success-msg">
            {{ success }}
        </div>
        {% endif %}

        <form method="post" action="{% url 'core_register' %}">
            {% csrf_token %}
            <div class="form-group">
                <label for="username">Nuevo Usuario</label>
                <input type="text" id="username" name="username" required autocomplete="off" placeholder="Ingresa un alias único">
            </div>
            
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" required placeholder="Al menos 4 caracteres">
            </div>

            <div class="form-group admin-field">
                <label for="adminToken">Clave Maestra de Admin <span class="optional-badge">Opcional</span></label>
                <input type="password" id="adminToken" name="adminToken" placeholder="Si tienes el token, eres Admin">
            </div>
            
            <button type="submit" class="btn">Crear Cuenta</button>
        </form>

        <div class="footer-links">
            ¿Ya tienes tu cuenta lista? <a href="{% url 'core_login' %}">Inicia sesión</a>
        </div>
    </div>

</body>
</html>
